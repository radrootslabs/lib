[contract]
name = "radroots-sdk-contract"
version = "0.1.0-alpha.1"
source = "rust"

[surface]
model_crates = [
  "radroots_core",
  "radroots_types",
  "radroots_events",
  "radroots_trade",
  "radroots_identity",
]
algorithm_crates = ["radroots_events_codec"]
wasm_crates = ["radroots_events_codec_wasm"]

[surface.internal_replica_crates]
schema = "radroots_replica_db_schema"
storage = "radroots_replica_db"
storage_wasm = "radroots_replica_db_wasm"
sync = "radroots_replica_sync"
sync_wasm = "radroots_replica_sync_wasm"

[export.ts]
packages = [
  "@radroots/core",
  "@radroots/types",
  "@radroots/events",
  "@radroots/trade",
  "@radroots/identity",
  "@radroots/events-codec-wasm",
]

[policy]
exclude_internal_workspace_crates = true
require_reproducible_exports = true
require_conformance_vectors = true

[policy.replica]
forbid_legacy_alias_identifiers = true
require_transport_agnostic_sync_contract = true
require_deterministic_emit_ingest = true
