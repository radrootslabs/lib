name: release-preflight

on:
  workflow_dispatch:

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: prime nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: run repo guards
        run: nix run .#guards

      - name: run release preflight
        run: nix run .#release-preflight

      - name: upload release preflight artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-preflight
          path: |
            target/coverage/coverage-refresh.tsv
            target/coverage/coverage-refresh-status.tsv
            target/coverage/**/gate-report.json
