name: release-preflight

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: install nix
        uses: cachix/install-nix-action@1ca7d21a94afc7c957383a2d217460d980de4934
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: run repo guards
        run: nix run .#guards

      - name: run release preflight
        run: nix run .#release-preflight

      - name: upload release preflight artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: release-preflight
          path: |
            target/coverage/coverage-refresh.tsv
            target/coverage/coverage-refresh-status.tsv
            target/coverage/**/gate-report.json
