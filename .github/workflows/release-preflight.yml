name: release-preflight

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: install nix
        uses: cachix/install-nix-action@1ca7d21a94afc7c957383a2d217460d980de4934
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: prime nix cache
        uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39

      - name: run repo guards
        run: nix run .#guards

      - name: run release preflight
        run: nix run .#release-preflight

      - name: upload release preflight artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-preflight
          path: |
            target/coverage/coverage-refresh.tsv
            target/coverage/coverage-refresh-status.tsv
            target/coverage/**/gate-report.json
