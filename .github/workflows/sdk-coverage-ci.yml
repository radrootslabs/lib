name: sdk-coverage-ci

on:
  pull_request:
  push:
    branches:
      - master
    paths:
      - "flake.nix"
      - "flake.lock"
      - "treefmt.nix"
      - "nix/**"
      - "rust-toolchain.toml"
      - ".github/workflows/sdk-coverage-ci.yml"
      - "crates/xtask/**"
      - "crates/**"

permissions:
  contents: read

jobs:
  coverage-report:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: install nix
        uses: cachix/install-nix-action@1ca7d21a94afc7c957383a2d217460d980de4934
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: run sdk coverage report set
        run: nix run .#coverage-report

      - name: upload sdk coverage reports
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: sdk-coverage-reports
          path: |
            target/sdk-coverage/**/coverage-gate-summary.json
            target/sdk-coverage/**/coverage-gate-blocking.json
            target/sdk-coverage/coverage-report-status.txt
