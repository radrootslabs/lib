name: publish crates

on:
  workflow_dispatch:
    inputs:
      crates:
        description: "space or comma separated crate names (empty = full release order)"
        required: false
        default: ""
      dry_run:
        description: "run cargo publish --dry-run"
        type: boolean
        required: false
        default: false
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-crates
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: install nix
        uses: cachix/install-nix-action@1ca7d21a94afc7c957383a2d217460d980de4934
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: prime nix cache
        uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39

      - name: verify workspace
        run: nix run .#check

      - name: publish crates
        env:
          EVENT_NAME: ${{ github.event_name }}
          CRATES_INPUT: ${{ github.event.inputs.crates }}
          DRY_RUN_INPUT: ${{ github.event.inputs.dry_run }}
          CRATES_IO_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail

          dry_run="false"
          crates_input=""
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            crates_input="${CRATES_INPUT:-}"
            dry_run="${DRY_RUN_INPUT:-false}"
          fi

          mode="--publish"
          if [ "${dry_run}" = "true" ]; then
            mode="--dry-run"
          fi

          if [ -n "${crates_input}" ]; then
            nix run .#publish-crates -- "${mode}" "${crates_input}"
          else
            nix run .#publish-crates -- "${mode}"
          fi
