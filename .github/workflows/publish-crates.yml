name: publish crates

on:
  workflow_dispatch:
    inputs:
      crates:
        description: "space or comma separated crate names (empty = full release order)"
        required: false
        default: ""
      dry_run:
        description: "run cargo publish --dry-run"
        type: boolean
        required: false
        default: false
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: publish-crates
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0

      - name: cache cargo
        uses: Swatinem/rust-cache@v2

      - name: verify workspace
        run: cargo check --workspace

      - name: publish crates
        env:
          EVENT_NAME: ${{ github.event_name }}
          CRATES_INPUT: ${{ github.event.inputs.crates }}
          DRY_RUN_INPUT: ${{ github.event.inputs.dry_run }}
          CRATES_IO_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail

          dry_run="false"
          crates_input=""
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            crates_input="${CRATES_INPUT:-}"
            dry_run="${DRY_RUN_INPUT:-false}"
          fi

          mode="--publish"
          if [ "${dry_run}" = "true" ]; then
            mode="--dry-run"
          fi

          if [ -n "${crates_input}" ]; then
            ./publish-crates.sh "${mode}" "${crates_input}"
          else
            ./publish-crates.sh "${mode}"
          fi
