[contract]
name = "radroots_sdk"
version = "0.1.0-alpha.2"
source = "rust"

[public]
domains = ["profile", "farm", "listing", "order", "trade_validation", "social"]

[shared_types]
public = [
  "WireEventParts",
  "UnsignedEventDraft",
  "RadrootsNostrEvent",
  "RadrootsNostrEventRef",
  "RadrootsNostrEventPtr",
  "RadrootsOrderListingAddress",
  "RadrootsProfile",
  "RadrootsFarm",
  "RadrootsListing",
  "RadrootsPost",
  "RadrootsComment",
  "RadrootsReaction",
  "RadrootsArticle",
  "RadrootsFileMetadata",
  "RadrootsCalendarDateEvent",
  "RadrootsCalendarTimeEvent",
  "RadrootsOrderEnvelope",
  "RadrootsOrderEventType",
  "RadrootsOrderItem",
  "RadrootsOrderPricingBasis",
  "RadrootsOrderEconomicLineKind",
  "RadrootsOrderEconomicActor",
  "RadrootsOrderEconomicEffect",
  "RadrootsOrderEconomicItem",
  "RadrootsOrderEconomicLine",
  "RadrootsOrderEconomicTotals",
  "RadrootsOrderEconomics",
  "RadrootsOrderRequest",
  "RadrootsOrderInventoryCommitment",
  "RadrootsOrderDecisionOutcome",
  "RadrootsOrderDecision",
]

[errors]
classes = ["encode_error", "parse_error", "validation_error", "address_error"]

[implementation_provenance]
model_crates = [
  "radroots_core",
  "radroots_events",
  "radroots_trade",
  "radroots_identity",
]
algorithm_crates = ["radroots_events_codec"]
wasm_crates = ["radroots_events_codec_wasm"]

[sdk]
rust_package = "radroots_sdk"
primary_domains = [
  "profile",
  "farm",
  "listing",
  "order",
  "trade_validation",
  "social",
]
public_surface = "operation_first"

[operations.profile_build_draft]
domain = "profile"
id = "profile.build_draft"
stability = "beta"
inputs = ["RadrootsProfile", "RadrootsProfileType?"]
outputs = ["WireEventParts"]
error_class = "encode_error"
deterministic = true
signing = "native"
transport = "native"

[operations.profile_build_draft.implementation]
rust_modules = ["crates/events_codec/src/profile/encode.rs"]
rust_types = ["radroots_events::profile::RadrootsProfile"]

[operations.profile_build_draft.conformance]
vector = "spec/conformance/vectors/profile/build_draft.v1.json"

[operations.farm_build_draft]
domain = "farm"
id = "farm.build_draft"
stability = "beta"
inputs = ["RadrootsFarm"]
outputs = ["WireEventParts"]
error_class = "encode_error"
deterministic = true
