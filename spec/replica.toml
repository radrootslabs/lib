[replica]
name = "radroots_replica_contract"
version = "0.1.0"
purpose = "offline-first local replica state and deterministic sync"

[crate_family]
schema = "radroots_replica_db_schema"
storage = "radroots_replica_db"
storage_wasm = "radroots_replica_db_wasm"
sync = "radroots_replica_sync"
sync_wasm = "radroots_replica_sync_wasm"

[policy]
transport_agnostic_sync_core = true
deterministic_emit_and_ingest = true
wasm_exports_prefix = "replica_"
forbid_legacy_alias_identifiers = true
