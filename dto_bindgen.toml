schema_version = 1

[export]
out_dir = "target/dto-bindgen"
emit_docs = false
wire_format = "json"

[numeric]
large_int_policy = "require_explicit"

[typescript]
enabled = true
out_dir = "target/dto-bindgen/core-bindings"
wire_contract = "json_exchange"
layout = "bundle"
bundle_file = "types.ts"
emit = "ts"
module_resolution = "bundler"
import_extension = "none"
type_only_imports = true
strict_null_checks_required = true
style = "dto_bindgen"

[python]
enabled = false

[[package]]
key = "core"
rust_package = "radroots_core"
rust_crate = "radroots_core"
npm = "@radroots/core-bindings"
out_dir = "target/dto-bindgen/core-bindings"

[package.root_discovery]
mode = "source_manifest"
source_files = [
  "crates/core/src/currency.rs",
  "crates/core/src/decimal.rs",
  "crates/core/src/discount.rs",
  "crates/core/src/money.rs",
  "crates/core/src/percent.rs",
  "crates/core/src/quantity.rs",
  "crates/core/src/quantity_price.rs",
  "crates/core/src/unit.rs",
]
root_module_file = "crates/core/src/generated/dto_roots.rs"

[[package]]
key = "events"
rust_package = "radroots_events"
rust_crate = "radroots_events"
npm = "@radroots/events-bindings"
out_dir = "target/dto-bindgen/events-bindings"

[package.root_discovery]
mode = "source_manifest"
source_files = [
  "crates/events/src/account.rs",
  "crates/events/src/app_data.rs",
  "crates/events/src/comment.rs",
  "crates/events/src/coop.rs",
  "crates/events/src/document.rs",
  "crates/events/src/farm.rs",
  "crates/events/src/follow.rs",
  "crates/events/src/gcs.rs",
  "crates/events/src/geochat.rs",
  "crates/events/src/gift_wrap.rs",
  "crates/events/src/job.rs",
  "crates/events/src/job_feedback.rs",
  "crates/events/src/job_request.rs",
  "crates/events/src/job_result.rs",
  "crates/events/src/lib.rs",
  "crates/events/src/list.rs",
  "crates/events/src/list_set.rs",
  "crates/events/src/listing.rs",
  "crates/events/src/message.rs",
  "crates/events/src/message_file.rs",
  "crates/events/src/order.rs",
  "crates/events/src/order_economics.rs",
  "crates/events/src/plot.rs",
  "crates/events/src/post.rs",
  "crates/events/src/profile.rs",
  "crates/events/src/reaction.rs",
  "crates/events/src/relay_document.rs",
  "crates/events/src/resource_area.rs",
  "crates/events/src/resource_cap.rs",
  "crates/events/src/seal.rs",
  "crates/events/src/trade_validation.rs",
]
root_module_file = "crates/events/src/generated/dto_roots.rs"
