[package]
name = "radroots_replica_db"
version = "0.1.0-alpha.1"
edition.workspace = true
authors = ["Tyson Lupul <tyson@radroots.org>"]
rust-version.workspace = true
license.workspace = true
description = "Replica database layer for Radroots"
repository.workspace = true
homepage.workspace = true
readme = "README"

[lib]
crate-type = ["rlib"]

[features]
default = []
web = ["radroots_sql_core/web"]
native = ["radroots_sql_core/native"]
embedded = ["radroots_sql_core/embedded"]
coverage-minimal = []

[dependencies]
radroots_sql_core = { workspace = true }
radroots_replica_db_schema = { workspace = true }
radroots_types = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
hex = { workspace = true }
sha2 = { workspace = true }

[dev-dependencies]
radroots_sql_core = { workspace = true, features = ["native"] }
