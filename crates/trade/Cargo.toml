[package]
name = "radroots_trade"
publish = ["crates-io"]
version = "0.1.0-alpha.2"
edition.workspace = true
authors = ["Tyson Lupul <tyson@radroots.org>"]
rust-version.workspace = true
license.workspace = true
description = "Trade domain model for Radroots"
repository.workspace = true
homepage.workspace = true
readme = "README"
build = "build.rs"

[features]
default = ["std", "serde", "serde_json", "ts-rs"]
std = ["radroots_core/std", "radroots_events/std", "radroots_events_codec/std"]
serde = [
  "dep:serde",
  "radroots_core/serde",
  "radroots_events/serde",
  "radroots_events_codec/serde",
]
serde_json = [
  "serde",
  "dep:base64",
  "dep:hex",
  "dep:serde_json",
  "dep:sha2",
  "radroots_events_codec/serde_json",
]
ts-rs = ["dep:ts-rs", "radroots_events/ts-rs", "radroots_events/std"]

[dependencies]
radroots_core = { workspace = true, default-features = false }
radroots_events = { workspace = true, default-features = false }
radroots_events_codec = { workspace = true, default-features = false }
base64 = { workspace = true, optional = true }
hex = { workspace = true, optional = true }
serde = { workspace = true, default-features = false, features = [
  "alloc",
  "derive",
], optional = true }
serde_json = { workspace = true, default-features = false, features = [
  "alloc",
], optional = true }
sha2 = { workspace = true, default-features = false, optional = true }
thiserror = { workspace = true }
ts-rs = { workspace = true, optional = true }
