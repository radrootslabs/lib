[package]
name = "radroots_sp1_host_trade"
publish = false
version = "0.1.0-alpha.2"
edition.workspace = true
build = "build.rs"
authors = ["Tyson Lupul <tyson@radroots.org>"]
rust-version.workspace = true
license.workspace = true
description = "SP1 host model for Radroots trade verification"
repository.workspace = true
homepage.workspace = true

[features]
default = []
sp1_verify = ["dep:bincode", "dep:sp1-build", "dep:sp1-sdk"]
sp1_proving = ["sp1_verify"]
sp1_cuda = ["dep:futures", "sp1_proving", "sp1-sdk/cuda"]

[dependencies]
base64 = { workspace = true }
bincode = { workspace = true, optional = true }
futures = { workspace = true, optional = true }
radroots_sp1_guest_trade = { workspace = true }
radroots_trade = { workspace = true, default-features = false, features = [
  "serde_json",
  "std",
] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
sha2 = { workspace = true }
sp1-sdk = { workspace = true, optional = true }
thiserror = { workspace = true }

[build-dependencies]
sp1-build = { workspace = true, optional = true }

[dev-dependencies]
radroots_events = { workspace = true, features = ["serde"] }
tokio = { workspace = true, features = ["rt-multi-thread"] }

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
  'cfg(coverage_nightly)',
] }
