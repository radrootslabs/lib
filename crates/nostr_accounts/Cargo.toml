[package]
name = "radroots_nostr_accounts"
version = "0.1.0-alpha.1"
edition.workspace = true
authors = [
  "Radroots Authors",
]
rust-version.workspace = true
license.workspace = true
description = "Nostr account model for Radroots"
repository.workspace = true
homepage.workspace = true
readme.workspace = true

[features]
default = ["std", "file-store", "memory-vault"]
std = [
  "dep:serde",
  "dep:serde_json",
  "dep:radroots_identity",
  "dep:radroots_nostr_signer",
  "dep:radroots_runtime",
  "dep:radroots_secret_vault",
]
file-store = ["std"]
memory-vault = ["std", "radroots_secret_vault/memory-vault"]
os-keyring = ["std", "radroots_secret_vault/os-keyring"]
ndb-bridge = ["std", "dep:radroots_nostr_ndb"]

[dependencies]
radroots_identity = { workspace = true, optional = true, default-features = false, features = [
  "std",
  "profile",
  "json-file",
] }
radroots_nostr_signer = { workspace = true, optional = true }
radroots_nostr_ndb = { workspace = true, optional = true, default-features = false, features = [
  "ndb",
  "giftwrap",
  "rt",
] }
radroots_secret_vault = { workspace = true, optional = true, default-features = false, features = [
  "std",
] }
radroots_runtime = { workspace = true, optional = true }
serde = { workspace = true, optional = true, features = ["derive"] }
serde_json = { workspace = true, optional = true }
thiserror = { workspace = true }
zeroize = { workspace = true }

[dev-dependencies]
radroots_test_fixtures = { workspace = true }
tempfile = { workspace = true }
