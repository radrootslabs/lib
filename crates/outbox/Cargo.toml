[package]
name = "radroots_outbox"
publish = false
version = "0.1.0-alpha.2"
edition.workspace = true
authors = ["Tyson Lupul <tyson@radroots.org>"]
rust-version.workspace = true
license.workspace = true
description = "Publish queue model for Radroots"
repository.workspace = true
homepage.workspace = true
readme = "README"

[features]
default = ["sqlite", "runtime-tokio"]
sqlite = ["dep:sqlx", "sqlx/sqlite"]
runtime-tokio = ["sqlx/runtime-tokio"]

[dependencies]
radroots_events = { workspace = true, default-features = false, features = [
  "std",
  "serde",
] }
radroots_event_store = { workspace = true, default-features = false, features = [
  "sqlite",
  "runtime-tokio",
] }
radroots_nostr = { workspace = true, default-features = false, features = [
  "std",
  "events",
] }
hex = { workspace = true }
serde = { workspace = true, features = ["std"] }
serde_json = { workspace = true, features = ["std"] }
sha2 = { workspace = true }
sqlx = { workspace = true, optional = true, features = ["derive"] }
thiserror = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt"] }
