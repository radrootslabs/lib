[package]
name = "radroots_local_events"
publish = ["crates-io"]
version = "0.1.0-alpha.2"
edition.workspace = true
authors = ["Tyson Lupul <tyson@radroots.org>"]
rust-version.workspace = true
license.workspace = true
description = "Local event workspace for Radroots"
repository.workspace = true
homepage.workspace = true
readme = "README"

[lib]
crate-type = ["rlib"]

[features]
default = []
native = ["radroots_sql_core/native"]

[dependencies]
radroots_sql_core = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
radroots_sql_core = { workspace = true, features = ["native"] }
