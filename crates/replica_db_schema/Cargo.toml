[package]
name = "radroots_replica_db_schema"
publish = ["crates-io"]
version = "0.1.0-alpha.2"
edition.workspace = true
authors = ["Tyson Lupul <tyson@radroots.org>"]
rust-version.workspace = true
license.workspace = true
description = "Replica schema model for Radroots"
repository.workspace = true
homepage.workspace = true
readme = "README"

[lib]
crate-type = ["rlib"]

[features]
default = []
dto-bindgen = ["dep:dto_bindgen_core"]

[dependencies]
dto_bindgen_core = { workspace = true, optional = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
radroots_types = { workspace = true }
