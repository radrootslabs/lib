[package]
name = "radroots_net_core"
publish = ["crates-io"]
version = "0.1.0-alpha.2"
edition.workspace = true
authors = ["Tyson Lupul <tyson@radroots.org>"]
rust-version.workspace = true
license.workspace = true
description = "Network orchestration and runtime interfaces"
repository.workspace = true
homepage.workspace = true
readme = "README"

[features]
default = ["std"]
std = ["serde/std"]
rt = ["std", "dep:tokio"]
nostr-client = [
  "std",
  "dep:radroots_events",
  "dep:radroots_events_codec",
  "radroots_events/serde",
  "dep:radroots_nostr_accounts",
  "dep:radroots_nostr_signer",
  "dep:secrecy",
  "dep:hex",
  "dep:tempfile",
  "dep:serde_json",
  "dep:radroots_nostr",
]
directories = ["std", "dep:directories"]
fs-persistence = ["std", "dep:radroots_runtime_paths"]

[dependencies]
radroots_events = { workspace = true, optional = true, default-features = true, features = [
  "std",
  "serde",
  "typeshare",
] }
radroots_log = { workspace = true, features = ["std"] }
radroots_nostr_accounts = { workspace = true, optional = true, default-features = true }
radroots_nostr_signer = { workspace = true, optional = true }
radroots_events_codec = { workspace = true, optional = true, default-features = true, features = [
  "std",
] }
radroots_nostr = { workspace = true, optional = true, default-features = true, features = [
  "client",
  "events",
  "codec",
] }
directories = { workspace = true, optional = true }
hex = { workspace = true, optional = true }
radroots_runtime_paths = { workspace = true, optional = true }
secrecy = { workspace = true, optional = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true, optional = true }
tempfile = { workspace = true, optional = true }
thiserror = { workspace = true }
tokio = { workspace = true, optional = true, features = ["rt-multi-thread"] }
tracing = { workspace = true }
futures = { workspace = true }

[dev-dependencies]
radroots_identity = { workspace = true, default-features = true }
