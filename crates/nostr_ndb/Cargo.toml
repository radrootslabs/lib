[package]
name = "radroots_nostr_ndb"
version = "0.1.0-alpha.1"
edition.workspace = true
authors = [
  "Radroots Authors",
]
rust-version.workspace = true
license.workspace = true
description = "NostrDB integration layer for Radroots"
repository.workspace = true
homepage.workspace = true
readme.workspace = true

[features]
default = ["std", "rt", "ndb", "runtime-adapter"]
std = []
rt = ["std", "dep:futures", "dep:tokio"]
ndb = ["std", "dep:nostrdb"]
runtime-adapter = ["std", "dep:radroots_nostr_runtime"]
giftwrap = ["std", "ndb"]

[dependencies]
radroots_nostr = { workspace = true, default-features = false, features = [
  "std",
] }
radroots_nostr_runtime = { workspace = true, optional = true, default-features = false, features = [
  "std",
  "rt",
  "nostr-client",
] }
futures = { workspace = true, optional = true }
hex = { workspace = true }
nostrdb = { version = "0.9.0", optional = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, optional = true, features = ["rt", "sync", "time"] }

[dev-dependencies]
radroots_test_fixtures = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt", "sync", "time"] }
tempfile = { workspace = true }
