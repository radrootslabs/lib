[package]
name = "radroots-net-core"
version.workspace = true
edition.workspace = true
authors = ["Radroots Authors"]
rust-version.workspace = true
license.workspace = true

[features]
default = ["std"]
std = []
rt = ["dep:tokio"]
nostr-client = [
"dep:nostr",
"dep:nostr-sdk",
"dep:secrecy",
"dep:hex",
"dep:tempfile",
"dep:serde_json"
]
directories = ["dep:directories"]
fs-persistence = []

[dependencies]
radroots-log = { workspace = true }
directories = { workspace = true, optional = true }
hex = { workspace = true, optional = true  }
nostr = { workspace = true, optional = true }
nostr-sdk = { workspace = true, optional = true }
secrecy = { workspace = true, optional = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true, optional = true }
tempfile = { workspace = true, optional = true }
thiserror = { workspace = true }
tokio = { workspace = true, optional = true, features = ["rt-multi-thread"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["fmt", "env-filter"] }
tracing-appender = { workspace = true }
