[package]
name = "radroots-nostr-accounts"
version = "0.1.0-alpha.1"
edition.workspace = true
authors = [
  "Radroots Authors",
]
rust-version.workspace = true
license.workspace = true
description = "Nostr account model for Radroots"
repository.workspace = true
homepage.workspace = true
readme.workspace = true

[features]
default = ["std", "file-store", "memory-vault"]
std = [
  "dep:serde",
  "dep:serde_json",
  "dep:radroots-identity",
  "dep:radroots-nostr-signer",
  "dep:radroots-runtime",
]
file-store = ["std"]
memory-vault = ["std"]
os-keyring = ["std", "dep:keyring"]
ndb-bridge = ["std", "dep:radroots-nostr-ndb"]

[dependencies]
keyring = { workspace = true, optional = true }
radroots-identity = { workspace = true, optional = true, default-features = false, features = [
  "std",
  "profile",
  "json-file",
] }
radroots-nostr-signer = { workspace = true, optional = true }
radroots-nostr-ndb = { workspace = true, optional = true, default-features = false, features = [
  "ndb",
  "giftwrap",
  "rt",
] }
radroots-runtime = { workspace = true, optional = true }
serde = { workspace = true, optional = true, features = ["derive"] }
serde_json = { workspace = true, optional = true }
thiserror = { workspace = true }
zeroize = { workspace = true }

[dev-dependencies]
radroots-test-fixtures = { workspace = true }
tempfile = { workspace = true }
