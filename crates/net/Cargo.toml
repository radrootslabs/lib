[package]
name = "radroots_net"
publish = ["crates-io"]
version = "0.1.0-alpha.2"
edition.workspace = true
authors = ["Tyson Lupul <tyson@radroots.org>"]
rust-version.workspace = true
license.workspace = true
description = "Network layer for Radroots"
repository.workspace = true
homepage.workspace = true
readme = "README"

[features]
default = ["std"]
std = ["radroots_net_core/std"]
rt = ["radroots_net_core/rt"]
all = ["std", "rt"]

[dependencies]
radroots_net_core = { workspace = true, optional = false }
