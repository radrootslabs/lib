[package]
name = "radroots-nostr"
version = "0.1.0-alpha.1"
edition.workspace = true
authors = [
  "Radroots Authors",
]
rust-version.workspace = true
license.workspace = true
description = "Nostr integration layer for Radroots"
repository.workspace = true
homepage.workspace = true
readme.workspace = true

[features]
default = ["std"]
std = []
client = ["std", "dep:nostr-sdk", "dep:radroots-identity"]
codec = [
  "dep:radroots-events",
  "dep:radroots-events-codec",
  "radroots-events-codec/nostr",
]
events = [
  "dep:radroots-events",
  "dep:radroots-events-codec",
  "radroots-events/std",
  "radroots-events/serde",
  "radroots-events-codec/std",
]
http = ["dep:reqwest"]
nip17 = ["std", "codec", "nostr/nip44", "nostr/nip59"]

[dependencies]
radroots-events = { workspace = true, optional = true, default-features = false }
radroots-events-codec = { workspace = true, optional = true, default-features = false }
radroots-identity = { workspace = true, optional = true, default-features = true }
nostr = { workspace = true, features = ["nip04"] }
nostr-sdk = { workspace = true, optional = true }
reqwest = { workspace = true, optional = true, default-features = false, features = [
  "json",
  "rustls-tls",
] }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
radroots-test-fixtures = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
