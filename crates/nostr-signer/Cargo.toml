[package]
name = "radroots-nostr-signer"
version = "0.1.0-alpha.1"
edition.workspace = true
authors = [
  "Radroots Authors",
]
rust-version.workspace = true
license.workspace = true
description = "Signer state model for Radroots"
repository.workspace = true
homepage.workspace = true
readme.workspace = true

[features]
default = []
native = ["dep:radroots-sql-core", "radroots-sql-core/native"]

[dependencies]
hex = { workspace = true }
nostr = { workspace = true }
radroots-identity = { workspace = true, default-features = false, features = [
  "std",
  "profile",
] }
radroots-nostr-connect = { workspace = true }
radroots-runtime = { workspace = true }
radroots-sql-core = { workspace = true, optional = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
sha2 = { workspace = true }
thiserror = { workspace = true }
url = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
radroots-sql-core = { workspace = true, features = ["native"] }
radroots-test-fixtures = { workspace = true }
tempfile = { workspace = true }

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(coverage_nightly)'] }
