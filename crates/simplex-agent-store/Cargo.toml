[package]
name = "radroots-simplex-agent-store"
version = "0.1.0-alpha.1"
edition.workspace = true
authors = [
  "Radroots Authors",
]
rust-version.workspace = true
license.workspace = true
description = "SimpleX agent storage model for Radroots"
repository.workspace = true
homepage.workspace = true
readme.workspace = true

[features]
default = ["std"]
std = ["radroots-simplex-agent-proto/std", "radroots-simplex-smp-proto/std"]

[dependencies]
radroots-simplex-agent-proto = { workspace = true, default-features = false }
radroots-simplex-smp-proto = { workspace = true, default-features = false }
