[contract]
version = "0.1.0-alpha.2"
stability = "draft"

[semver]
major_on = [
  "remove_exported_type",
  "remove_exported_field",
  "change_exported_field_type",
  "change_exported_enum_variant",
  "change_exported_algorithm_behavior",
  "rename_internal_replica_crate_family",
]
minor_on = [
  "add_exported_type",
  "add_optional_field",
  "add_enum_variant",
  "add_conformance_vector",
  "add_replica_transport_adapter",
]
patch_on = [
  "fix_docs",
  "fix_non_behavioral_contract_metadata",
  "fix_packaging_metadata",
]

[compatibility]
requires_conformance_pass = true
requires_contract_manifest_diff = true
requires_release_notes = true
