[gate]
fail_under_exec_lines = 100.0
fail_under_functions = 100.0
fail_under_regions = 100.0
fail_under_branches = 100.0
require_branches = true

# Heavy-development baseline: required crates must hold 100% coverage across
# executable lines, functions, regions, and branches. Temporary threshold
# overrides below 100% are not part of the active gate.

[overrides.radroots_log]
require_branches = false
temporary = true
reason = "branch coverage is not applicable while the crate has no measured branch records"

[overrides.radroots_net]
require_branches = false
temporary = true
reason = "branch coverage is not applicable while the crate has no measured branch records"

[overrides.radroots_replica_db_schema]
require_branches = false
temporary = true
reason = "branch coverage is not applicable while the crate has no measured branch records"

[overrides.radroots_test_fixtures]
require_branches = false
temporary = true
reason = "branch coverage is not applicable while the crate has no measured branch records"

[required]
crates = [
  "radroots_authority",
  "radroots_core",
  "radroots_event_store",
  "radroots_events",
  "radroots_events_codec",
  "radroots_events_indexed",
  "radroots_geocoder",
  "radroots_identity",
  "radroots_local_events",
  "radroots_log",
  "radroots_net",
  "radroots_nostr",
  "radroots_nostr_accounts",
  "radroots_nostr_connect",
  "radroots_nostr_ndb",
  "radroots_nostr_runtime",
  "radroots_nostr_signer",
  "radroots_outbox",
  "radroots_protected_store",
  "radroots_relay_transport",
  "radroots_replica_db",
  "radroots_replica_db_schema",
  "radroots_replica_sync",
  "radroots_runtime",
  "radroots_runtime_distribution",
  "radroots_runtime_manager",
  "radroots_runtime_paths",
  "radroots_secret_vault",
  "radroots_sp1_guest_trade",
  "radroots_sp1_host_trade",
  "radroots_sql_core",
  "radroots_test_fixtures",
  "radroots_trade",
  "radroots_types",
  "xtask",
]
